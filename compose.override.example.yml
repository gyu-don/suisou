# compose.override.yml — personal overrides (auto-merged with compose.yml)
# Copy this file to compose.override.yml and edit as needed.

services:
  openclaw:
    environment:
      # Dummy credentials for the sandbox — the router replaces SUISOU__*
      # markers with real values from its own environment.
      # - ANTHROPIC_API_KEY=SUISOU__ANTHROPIC_API_KEY
      # - OPENAI_API_KEY=SUISOU__OPENAI_API_KEY

    # --- Ollama example ---
    # To use a local Ollama instance on the host, uncomment the onboard
    # flags below and run:
    #   docker compose run --rm --no-deps openclaw node openclaw.mjs onboard \
    #     --mode local --no-install-daemon --auth-choice custom-api-key \
    #     --custom-base-url http://host.docker.internal:11434/v1 \
    #     --custom-model-id nemotron-cascade-2:30b \
    #     --custom-api-key ollama --custom-compatibility openai \
    #     --secret-input-mode plaintext

  router:
    environment:
      # Real API keys — pass through from host environment.
      # - OPENAI_API_KEY
      # - ANTHROPIC_API_KEY
      # - GOOGLE_API_KEY
      # - GITHUB_TOKEN
