services:
  openclaw:
    build:
      context: sandbox
    init: true
    depends_on:
      router:
        condition: service_started
    networks:
      - sandbox
      - external
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18789:18789"
    environment:
      HTTP_PROXY: http://router:8080
      HTTPS_PROXY: http://router:8080
      http_proxy: http://router:8080
      https_proxy: http://router:8080
      NO_PROXY: host.docker.internal
      no_proxy: host.docker.internal
    volumes:
      - mitmproxy-ca:/mitmproxy-ca:ro
      - openclaw-config:/home/node/.openclaw

  router:
    build:
      context: router
    init: true
    networks:
      - sandbox
      - external
    environment:
    volumes:
      - mitmproxy-ca:/home/mitmproxy/.mitmproxy
      - ./router/allowlist.json:/etc/suisou/allowlist.json:ro
      - ./router/credentials.json:/etc/suisou/credentials.json:ro

volumes:
  openclaw-config:
  mitmproxy-ca:

networks:
  sandbox:
    driver: bridge
    internal: true
  external:
    driver: bridge
