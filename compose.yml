services:
  openclaw:
    build:
      context: sandbox
    init: true
    restart: unless-stopped
    network_mode: "service:wg-client"
    volumes:
      - mitmproxy-ca:/mitmproxy-ca:ro
      - openclaw-config:/home/node/.openclaw
    depends_on:
      wg-client:
        condition: service_healthy

  wg-client:
    build:
      context: wg-client
    init: true
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - ALL
    volumes:
      - mitmproxy-ca:/mitmproxy-ca:ro
    depends_on:
      router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/wg-ready"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - tunnel

  router:
    build:
      context: router
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tunnel
      - external
    volumes:
      - mitmproxy-ca:/home/mitmproxy/.mitmproxy
      - ./router/config.toml:/etc/suisou/config.toml:ro
    healthcheck:
      test: ["CMD", "test", "-f", "/home/mitmproxy/.mitmproxy/wireguard.conf"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  openclaw-config:
  mitmproxy-ca:

networks:
  tunnel:
    driver: bridge
  external:
    driver: bridge
