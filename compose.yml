services:
  openclaw:
    build:
      context: sandbox
    init: true
    depends_on:
      router:
        condition: service_started
    networks:
      - sandbox
    environment:
      HTTP_PROXY: http://router:8080
      HTTPS_PROXY: http://router:8080
      http_proxy: http://router:8080
      https_proxy: http://router:8080
    volumes:
      - mitmproxy-ca:/mitmproxy-ca:ro
      - workspace:/home/sandbox/workspace

  router:
    build:
      context: router
    init: true
    networks:
      - sandbox
      - external
    volumes:
      - mitmproxy-ca:/home/mitmproxy/.mitmproxy
      - ./router/allowlist.json:/etc/suisou/allowlist.json:ro
      - ./router/credentials.json:/etc/suisou/credentials.json:ro

  inference:
    image: maximhq/bifrost:latest
    profiles:
      - inference
    networks:
      - sandbox
    environment:
      LOG_LEVEL: info
    volumes:
      - ./inference/config.json:/app/data/config.json:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  workspace:
  mitmproxy-ca:

networks:
  sandbox:
    driver: bridge
    internal: true
  external:
    driver: bridge
