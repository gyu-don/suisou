services:
  openclaw:
    build:
      context: sandbox
    init: true
    depends_on:
      router:
        condition: service_started
    networks:
      - sandbox
    environment:
      HTTP_PROXY: http://router:8080
      HTTPS_PROXY: http://router:8080
      http_proxy: http://router:8080
      https_proxy: http://router:8080
    volumes:
      - mitmproxy-ca:/mitmproxy-ca:ro
      - workspace:/home/sandbox/workspace

  router:
    build:
      context: router
    init: true
    networks:
      - sandbox
      - external
    environment:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
    volumes:
      - mitmproxy-ca:/home/mitmproxy/.mitmproxy
      - ./router/allowlist.json:/etc/suisou/allowlist.json:ro
      - ./router/credentials.json:/etc/suisou/credentials.json:ro

volumes:
  workspace:
  mitmproxy-ca:

networks:
  sandbox:
    driver: bridge
    internal: true
  external:
    driver: bridge
