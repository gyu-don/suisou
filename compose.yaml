services:
  openclaw:
    build:
      context: sandbox
    init: true
    restart: unless-stopped
    network_mode: "service:wg-client"
    volumes:
      - router-public:/mitmproxy-ca:ro
      - openclaw-config:/home/node/.openclaw
    depends_on:
      wg-client:
        condition: service_healthy

  wg-client:
    build:
      context: wg-client
    init: true
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - ALL
    volumes:
      - router-public:/mitmproxy-ca:ro
    ports:
      - "18789:18789"
    depends_on:
      router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/wg-ready"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - tunnel

  router:
    build:
      context: router
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tunnel
      - external
    volumes:
      - router-public:/data/public
      - router-private:/data/private
      - ./router/config.toml:/etc/suisou/config.toml:ro
    healthcheck:
      test: ["CMD", "/suisou-router", "--healthcheck"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  openclaw-config:
  router-public:
  router-private:

networks:
  tunnel:
    driver: bridge
  external:
    driver: bridge
